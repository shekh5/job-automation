<!DOCTYPE html>
<html>
<head>
  <title>Ashby Job Posting</title>
</head>
<body>
  <form id="ashby-form">
    <label>
      Full Name
      <input type="text" name="name">
    </label>
    
    <label>
      Email Address
      <input type="email" name="email">
    </label>

    <label>
      Phone Number
      <input type="tel" name="phone">
    </label>
    
    <div>
      <label>LinkedIn Profile</label>
      <div><input type="url" name="linkedin"></div>
    </div>
    
    <div>
      <label>GitHub Profile</label>
      <div><input type="url" name="github"></div>
    </div>
    
    <div>
      <label>Resume/CV</label>
      <input type="file" name="resume">
    </div>

    <button type="submit">Submit</button>
  </form>
</body>
</html>
